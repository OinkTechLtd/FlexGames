<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 380px;
      height: 520px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f23, #1a1a3e);
      color: #fff;
      overflow: hidden;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
    .logo {
      font-size: 42px;
      margin: 20px 0;
      text-shadow: 0 0 20px #00ffcc;
    }
    .button {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00ffcc, #ff00cc);
      border: none;
      color: #000;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      margin: 30px auto;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      transition: all 0.3s;
    }
    .button:active {
      transform: scale(0.95);
    }
    .timer {
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
      color: #00ffcc;
    }
    .status {
      margin: 15px 0;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
    }
    button {
      background: #333;
      color: white;
      border: none;
      padding: 12px 24px;
      margin: 8px;
      border-radius: 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">GOIDAX</div>
    <button id="activateBtn" class="button">АКТИВИРОВАТЬ<br>ОБХОД</button>
    <div id="timer" class="timer">00:00</div>
    <div class="status" id="status">Готов к работе</div>
    
    <button id="customDnsBtn">Собрать свой DNS</button>
    <button id="sitesBtn">Открыть заблокированные сайты</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
